<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monster Hunter Series Wiki</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Monster Hunter Series Wiki</h1>
        <nav>

            <a href="#about">シリーズ紹介</a>

            <a href="#games">作品一覧</a>

            <a href="#tts">Pocket TTS</a>

            <a href="#notice">注意事項</a>

        </nav>
    </header>

    <main>
    <section class="hero">
        <div class="hero-content">
            <h2>Monster Hunter Series Wiki</h2>
            <p>
                歴代モンスターハンターシリーズの作品情報、
                モンスター、武器、ゲームシステムを紹介する
                非公式ファンWikiです。
            </p>
            <a href="#games" class="button">
                作品一覧を見る
            </a>
        </div>
    </section>
</main>

    <script>
        // ボタンを押すと犬の画像を取得する関数
        async function fetchDog() {
            try {
                const response = await fetch('https://dog.ceo/api/breeds/image/random');
                const data = await response.json();
                document.getElementById('dog-img').src = data.message;
            } catch (error) {
                console.error("データの取得に失敗しました:", error);
            }
        }

        document.getElementById('update-btn').addEventListener('click', fetchDog);
        fetchDog(); // 初回起動時にも実行
    </script>
</body>
</html>
